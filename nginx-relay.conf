load_module /usr/lib/nginx/modules/ngx_rtmp_module.so;
worker_processes 1;
error_log /home/ubuntu/cctv-dashboard/logs/error.log warn;
pid /home/ubuntu/cctv-dashboard/logs/nginx.pid;
events { worker_connections 1024; }

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        timeout 30s;
        drop_idle_publisher 10s;

        application live {
            live on;
            record off;
            allow publish 127.0.0.1;
            allow publish ::1;
            deny publish all;
            allow play 127.0.0.1;
            allow play ::1;
            deny play all;
        }
    }
}

http {
    access_log /home/ubuntu/cctv-dashboard/logs/access.log;
    server {
        listen 127.0.0.1:8080;
        location /stat { rtmp_stat all; }
        location / { return 404; }
    }
}
